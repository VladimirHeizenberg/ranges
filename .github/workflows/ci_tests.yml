name: "CI tests"

on:
  push:
    branches: [develop]

jobs:

  ci:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Create CMake cache
        run: cmake -S . -B cmake-build-debug

      - name: Build target
        run: cmake --build cmake-build-debug --target processing-lib-test
        
      - name: Run tests
        working-directory: cmake-build-debug
        run: ctest